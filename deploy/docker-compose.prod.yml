services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zasfood}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zasfood}
    # Puerto NO expuesto al exterior — solo accesible entre contenedores
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zasfood} -d ${POSTGRES_DB:-zasfood}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Puerto NO expuesto al exterior — solo accesible entre contenedores
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-zasfood}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-zasfood}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npx prisma db push && npm run start"]

volumes:
  pgdata:
  redisdata:
