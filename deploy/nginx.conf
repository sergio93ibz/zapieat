# Configuración Nginx para ZapiEat
# Dominio: zapieat.app + *.zapieat.app (multi-tenancy)
#
# Instrucciones de instalación en el VPS:
#   sudo cp /opt/zasfood/deploy/nginx.conf /etc/nginx/sites-available/zapieat
#   sudo ln -s /etc/nginx/sites-available/zapieat /etc/nginx/sites-enabled/zapieat
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name zapieat.app *.zapieat.app;

    # Certbot usará este bloque para verificar el dominio y añadirá
    # automáticamente la configuración HTTPS (443) al ejecutar certbot --nginx

    # Tamaño máximo de subida (imágenes del menú, logos, etc.)
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Soporte para WebSockets (Next.js HMR y conexiones en tiempo real)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Headers necesarios para que Next.js conozca el host real y el protocolo
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
