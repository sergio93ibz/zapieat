services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: zasfood
      POSTGRES_PASSWORD: zasfood
      POSTGRES_DB: zasfood
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://zasfood:zasfood@db:5432/zasfood
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npx prisma db push && npm run start"]

volumes:
  pgdata:
  redisdata:
